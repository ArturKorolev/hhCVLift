<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hhCVlift</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>hhCVlift</h1>
        <p class="subtitle">Автоподнятие резюме на hh.ru</p>
      </header>

      <label class="field">
        <span>Ссылка на «Мои резюме»</span>
        <input
          id="profileUrl"
          type="url"
          spellcheck="false"
        />
      </label>

      <div class="actions">
        <button id="startBtn" class="btn btn-start">Запустить автопродление</button>
        <button id="stopBtn" class="btn btn-stop" disabled>Остановить</button>
      </div>

      <button id="liftNowBtn" class="btn btn-secondary">Поднять сейчас</button>

      <section class="status" id="status">
        <div class="status-row">
          <span class="label">Статус</span>
          <span id="statusText" class="value">Остановлено</span>
        </div>
        <div class="status-row">
          <span class="label">Последний запуск</span>
          <span id="lastLiftText" class="value">—</span>
        </div>
        <div class="status-row">
          <span class="label">Следующая попытка</span>
          <span id="nextLiftText" class="value">—</span>
        </div>
        <p id="messageText" class="message"></p>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
